<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<title> Perspective Tool </title>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="konva.js"></script>
<script src="math.min.js"></script>
<link rel="stylesheet" href="pico.min.css">
<link rel="stylesheet" href="number_input.css">

</head>

<body>

<div id='container'></div>

<main class="container">
    <section>
        <!-- https://get.foundation/building-blocks/blocks/input-number-group.html -->
        <legend>複製(duplication)</legend>
        <div class="grid">
        <div class="input-group input-number-group">
            <h4 style="width: 100;">+X</h4>
            <div class="input-group-button">
                <span class="input-number-decrement">-</span>
            </div>
            <input id="dup_pos_x_axis" class="input-number" type="number" value="0" min="0" max="1000">
            <div class="input-group-button">
            <span class="input-number-increment">+</span>
            </div>
        </div>

        <div class="input-group input-number-group">
            <h4 style="width: 100;">-X</h4>
            <div class="input-group-button">
                <span class="input-number-decrement">-</span>
            </div>
            <input id="dup_neg_x_axis" class="input-number" type="number" value="0" min="0" max="1000">
            <div class="input-group-button">
            <span class="input-number-increment">+</span>
            </div>
        </div>
        </div>
        
        <div class="grid">
        <div class="input-group input-number-group">
            <h4 style="width: 100;">+Y</h4>
            <div class="input-group-button">
                <span class="input-number-decrement">-</span>
            </div>
            <input id="dup_pos_y_axis" class="input-number" type="number" value="0" min="0" max="1000">
            <div class="input-group-button">
            <span class="input-number-increment">+</span>
            </div>
        </div>

        <div class="input-group input-number-group">
            <h4 style="width: 100;">-Y</h4>
            <div class="input-group-button">
                <span class="input-number-decrement">-</span>
            </div>
            <input id="dup_neg_y_axis" class="input-number" type="number" value="0" min="0" max="1000">
            <div class="input-group-button">
            <span class="input-number-increment">+</span>
            </div>
        </div>
        </div>
    </section>
    <section>
        <legend>マージン(margin)</legend>
        <div class="input-group input-number-group">
            <div class="input-group-button">
                <span class="input-number-decrement">-</span>
            </div>
            <input id="margin" class="input-number" type="number" value="0" min="0" max="1000">
            <div class="input-group-button">
            <span class="input-number-increment">+</span>
            </div>
        </div>
        </div>
    </section>
    <section>
        <legend>回転[正方形の場合](rotation, square case)</legend>
        <div class="input-group input-number-group">
            <div class="input-group-button">
                <span class="input-number-decrement">-</span>
            </div>
            <input id="rotation" class="input-number" type="number" value="0" min="0" max="1000">
            <div class="input-group-button">
            <span class="input-number-increment">+</span>
            </div>
        </div>
        </div>
    </section>

    <button id="open_button">画像を開く(open)</button>
    <label>
    画像の透明度(image opacity)
    <input id="image_opacity" type="range" value="100"/>
    </label>
    <button id="save_button">セーブ(download)</button>

</main>
<a href="https://github.com/Ushio/Perspective-Tool">Github Repo</a>

<script>
    function getPerspectiveTransform(src_xs, src_ys, dst_xs, dst_ys)
    {
        // Refs
        // https://github.com/Ushio/getPerspectiveTransform
        // https://mathjs.org/docs/reference/functions/lusolve.html
        
        let A = math.zeros([8, 8]);
        let b = math.zeros([8]);
        for (let i = 0; i < 4; i++)
        {
            const even = i * 2;
            const odd = i * 2 + 1;

            A[even][0] = src_xs[i];
            A[even][1] = src_ys[i];
            A[even][2] = 1;
            A[even][3] = 0;
            A[even][4] = 0;
            A[even][5] = 0;
            A[even][6] = -dst_xs[i] * src_xs[i];
            A[even][7] = -dst_xs[i] * src_ys[i];

            A[odd][0] = 0;
            A[odd][1] = 0;
            A[odd][2] = 0;
            A[odd][3] = src_xs[i];
            A[odd][4] = src_ys[i];
            A[odd][5] = 1;
            A[odd][6] = -dst_ys[i] * src_xs[i];
            A[odd][7] = -dst_ys[i] * src_ys[i];

            b[even] = dst_xs[i];
            b[odd] = dst_ys[i];
        }

        const xs = math.lusolve(A, b);
        return math.matrix([
            [xs[0][0], xs[1][0], xs[2][0]],
            [xs[3][0], xs[4][0], xs[5][0]],
            [xs[6][0], xs[7][0], 1.0]
        ]);
    }

    function getPerspectivePoint(perspective_matrix, src_x, src_y)
    {
        const projected = math.multiply(g_perspective_matrix, [src_x, src_y, 1.0]);
        const w = projected.get([2]);
        const p_x = projected.get([0]) / w;
        const p_y = projected.get([1]) / w;
        return [p_x, p_y, w];
    }

    let g_background_image = null;
    let g_perspective_matrix = null;
    let g_dup_pos_x_axis = 0;
    let g_dup_neg_x_axis = 0;
    let g_dup_pos_y_axis = 0;
    let g_dup_neg_y_axis = 0;
    let g_margin = 0;
    let g_rotation = 0;

    const stage = new Konva.Stage({
        container: 'container',
        width: 500,
        height: 400,
    });

    // Create a layer
    const bglayer = new Konva.Layer();
    stage.add(bglayer);
    
    const drawlayer = new Konva.Layer();
    stage.add(drawlayer);

    const cplayer = new Konva.Layer();
    stage.add(cplayer);
    
    const imageObj = new Image();
    imageObj.onload = function () {
        const background_image = new Konva.Image({image: imageObj});
        background_image.preventDefault(false);
        // background_image.opacity(0.5);

        bglayer.add(background_image);
        stage.width(background_image.attrs.image.naturalWidth);
        stage.height(background_image.attrs.image.naturalHeight);
        
        g_background_image = background_image;

        invalidateDrawings();
    };
    imageObj.src = 'sample1.png';


    function buildAnchor(x, y) {
        const anchor = new Konva.Circle({
            x: x,
            y: y,
            radius: 10,
            stroke: "#010101",
            fill: '#ddd',
            strokeWidth: 2,
            draggable: true,
            hitStrokeWidth: 25,
            opacity: 0.5,
        });
        cplayer.add(anchor);

        // Add hover styling
        anchor.on('mouseover', function () {
            document.body.style.cursor = 'grab';
            this.strokeWidth(4);
        });
        
        anchor.on('mouseout', function () {
            document.body.style.cursor = 'default';
            this.strokeWidth(2);
        });

        // Update curves when anchor is moved
        anchor.on('dragmove', function () {
            // updateDottedLines();
            // console.log(anchor);
            anchor.attrs.x;
            anchor.attrs.y;

            invalidateDrawings();
        });

        return anchor;
    }

    let anchors = [
        buildAnchor(954, 480),
        buildAnchor(750, 545),
        buildAnchor(959, 627),
        buildAnchor(1160, 541),
    ]

    const base_shape = new Konva.Shape({
        sceneFunc: function (context, shape) {
            context.beginPath();
            context.moveTo(anchors[0].attrs.x, anchors[0].attrs.y);
            for (let i = 1; i < anchors.length; i++) {
                context.lineTo(anchors[i].attrs.x, anchors[i].attrs.y);
            } 
            context.closePath();
            context.fillStrokeShape(shape);
        },
        fill: 'rgba(255, 128, 128, 0.5)',
        stroke: 'rgba(0, 0, 0)',
        strokeWidth: 2
    });
    cplayer.add(base_shape)

    let guide_objects = [];
    let duplicates = [];

    function invalidateDrawings()
    {
        const src_xs = [ -1, +1, +1, -1 ];
        const src_ys = [ -1, -1, +1, +1 ];
        let dst_xs = math.zeros([4]);
        let dst_ys = math.zeros([4]);
        for (let i = 0; i < 4; i++)
        {
            dst_xs[i] = anchors[i].attrs.x;
            dst_ys[i] = anchors[i].attrs.y;
        }
        g_perspective_matrix = getPerspectiveTransform(src_xs, src_ys, dst_xs, dst_ys);
        
        // for(let i = 0 ; i < 4 ; i++)
        // {
        //     rotated = math.rotate([src_xs[i], src_ys[i]], g_rotation / 360.0 * math.pi * 2.0);
        //     src_xs[i] = rotated[0];
        //     src_ys[i] = rotated[1];
        // }


        for(let i = 0 ; i < guide_objects.length ; i++)
        {
            guide_objects[i].remove();
        }
        guide_objects = [];

        // const N = 10;
        // for (let y = 0; y < N; y++)
        // {
        //     for (let x = 0; x < N; x++)
        //     {
        //         const src_x = lerp(-1.0, +1.0, x / (N - 1));
        //         const src_y = lerp(-1.0, +1.0, y / (N - 1));
                
        //         const p_xy = getPerspectivePoint(g_perspective_matrix, src_x, src_y);
        //         const circle = new Konva.Circle({
        //             x: p_xy[0],
        //             y: p_xy[1],
        //             radius: 3,
        //             fill: 'black'
        //         });

        //         drawlayer.add(circle);
        //         dots.push(circle);
        //     }
        // }

        // Arrows
        if(true)
        {
            const center_xy = getPerspectivePoint(g_perspective_matrix, 0, 0);
            const rotated_to = math.rotate([1.0, 0.0], g_rotation / 360.0 * math.pi * 2.0);
            const p_xy = getPerspectivePoint(g_perspective_matrix, rotated_to[0], rotated_to[1]);
            const arrow = new Konva.Arrow({
                x: center_xy[0],
                y: center_xy[1],
                points: [0, 0, p_xy[0] - center_xy[0], p_xy[1] - center_xy[1]],
                pointerLength: 20,
                pointerWidth: 20,
                stroke: 'red',
                strokeWidth: 3
            });

            cplayer.add(arrow);
            guide_objects.push(arrow);
        }
        if(true)
        {
            const center_xy = getPerspectivePoint(g_perspective_matrix, 0, 0);
            const rotated_to = math.rotate([0.0, 1.0], g_rotation / 360.0 * math.pi * 2.0);
            const p_xy = getPerspectivePoint(g_perspective_matrix, rotated_to[0], rotated_to[1]);
            const arrow = new Konva.Arrow({
                x: center_xy[0],
                y: center_xy[1],
                points: [0, 0, p_xy[0] - center_xy[0], p_xy[1] - center_xy[1]],
                pointerLength: 20,
                pointerWidth: 20,
                stroke: 'green',
                strokeWidth: 3
            });

            cplayer.add(arrow);
            guide_objects.push(arrow);
        }


        // Duplication
        for(let i = 0 ; i < duplicates.length ; i++)
        {
            duplicates[i].remove();
        }
        duplicates = [];
        
        function duplicate_square(n, x_step, y_step, rotation, margin)
        {
            for(let i = 0 ; i < n + 1; i++)
            {
                let points = [];
                let has_bad_vertex = false;
                for(let j = 0 ; j < 4 ; j++)
                {
                    const src_x = src_xs[j] + i * 2.0 * x_step * (1.0 + margin);
                    const src_y = src_ys[j] + i * 2.0 * y_step * (1.0 + margin);

                    const rotated = math.rotate([src_x, src_y], rotation / 360.0 * math.pi * 2.0);
                    const p_xy = getPerspectivePoint(g_perspective_matrix, rotated[0], rotated[1]);
                    if(p_xy[2] < 0.0)
                    {
                        has_bad_vertex = true;
                    }

                    points.push(p_xy[0]);
                    points.push(p_xy[1]);
                }

                if(has_bad_vertex)
                {
                    break;
                }

                const polygon = new Konva.Line({
                    points: points,
                    stroke: 'black',
                    strokeWidth: 1,
                    closed: true
                });
                drawlayer.add(polygon);
                duplicates.push(polygon);
            }
        }

        duplicate_square(g_dup_pos_x_axis, +1, 0, g_rotation, g_margin / 100.0);
        duplicate_square(g_dup_neg_x_axis, -1, 0, g_rotation, g_margin / 100.0);
        duplicate_square(g_dup_pos_y_axis, 0, +1, g_rotation, g_margin / 100.0);
        duplicate_square(g_dup_neg_y_axis, 0, -1, g_rotation, g_margin / 100.0);

        drawlayer.batchDraw();
    }

    // UI
    $('.input-number-increment').click(function() {
        let $input = $(this).parents('.input-number-group').find('.input-number');
        let val = parseInt($input.val(), 10);

        let step = 1;
        if($input.attr('id') == "rotation")
        {
            step = 15;
        }
        else if($input.attr('id') == "margin")
        {
            step = 10;
        }

        $input.val(val + step).trigger('input');
    });

    $('.input-number-decrement').click(function() {
        let $input = $(this).parents('.input-number-group').find('.input-number');
        let val = parseInt($input.val(), 10);

        if($input.attr('id') == "rotation")
        {
            $input.val(val - 15).trigger('input');
            return;
        }
        if($input.attr('id') == "margin")
        {
            $input.val(val - 10).trigger('input');
            return;
        }
        $input.val(math.max(val - 1, 0)).trigger('input');
    })

    // UI
    $('#dup_pos_x_axis').on('input', function(e){
        // console.log(e.target.value);
        g_dup_pos_x_axis = parseInt(e.target.value);
        invalidateDrawings();
    });
    $('#dup_neg_x_axis').on('input', function(e){
        // console.log(e.target.value);
        g_dup_neg_x_axis = parseInt(e.target.value);
        invalidateDrawings();
    });
    $('#dup_pos_y_axis').on('input', function(e){
        // console.log(e.target.value);
        g_dup_pos_y_axis = parseInt(e.target.value);
        invalidateDrawings();
    });
    $('#dup_neg_y_axis').on('input', function(e){
        // console.log(e.target.value);
        g_dup_neg_y_axis = parseInt(e.target.value);
        invalidateDrawings();
    });

    $('#rotation').on('input', function(e){
        // console.log(e.target.value);
        g_rotation = parseInt(e.target.value);
        invalidateDrawings();
    });
    $('#margin').on('input', function(e){
        // console.log(e.target.value);
        g_margin = parseInt(e.target.value);
        invalidateDrawings();
    });

    $('#open_button').on('click', function(){
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = event => { 
            let reader = new FileReader();
            reader.onload = function(event) {
                const imageObj = new Image();
                imageObj.onload = function() {
                    const background_image = new Konva.Image({image: imageObj});
                    background_image.preventDefault(false);
                    background_image.opacity(g_background_image.opacity());
                    bglayer.add(background_image);
                    stage.width(background_image.attrs.image.naturalWidth);
                    stage.height(background_image.attrs.image.naturalHeight);
                    
                    g_background_image.remove();
                    g_background_image = background_image;

                    invalidateDrawings();
                };
                imageObj.src = event.target.result;
            };
            reader.readAsDataURL(event.target.files[0]);
        };
        input.click();
    });

    $('#save_button').on('click', function(){
        bglayer.visible(false);
        cplayer.visible(false);
        const dataURL = stage.toDataURL({
            pixelRatio: 1
        });

        bglayer.visible(true);
        cplayer.visible(true);
        
        // create link to download
        const link = document.createElement('a');
        link.download = 'guide.png';
        link.href = dataURL;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
    $('#image_opacity').on('input', function(e){
        g_background_image.opacity(parseInt(e.target.value) / 100.0);
    });
    

</script>
</body>
</html>
